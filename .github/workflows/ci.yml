name: CI/CD Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - run: pip install -r requirements.txt
      - run: python train.py

      - run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-pipeline:latest .

      - run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - run: docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-pipeline:latest